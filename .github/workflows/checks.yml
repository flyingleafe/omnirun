name: Checks

on:
  workflow_call:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: ruff + ruff-format
        run: nix flake check -L

      - name: basedpyright
        run: nix develop --command basedpyright

      - name: Build trace-check (formal model checker)
        run: nix build .#trace-check --out-link trace-check

      - name: Tests
        run: >
          nix develop --command env
          OMNIRUN_TRACE_CHECK=$PWD/trace-check/bin/trace-check
          uv run pytest -q

      # The conformance-marked suites (bounded-exhaustive enumeration, the
      # provider contract, the trace-gated engine tests) MUST run against the
      # compiled checker — a missing binary skips them locally but is a
      # failure here, so conformance coverage can never silently vanish.
      - name: Conformance suites (trace-check gated)
        run: >
          nix develop --command env
          OMNIRUN_TRACE_CHECK=$PWD/trace-check/bin/trace-check
          uv run pytest -q -m conformance

      - name: Minimize uv cache
        run: nix develop --command uv cache prune --ci
